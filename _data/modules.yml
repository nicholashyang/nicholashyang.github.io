- id: biography
  title: Biography
  nav: true
  enabled: true
  type: prose
  intro: A concise overview for first-time visitors.
  body:
    - >-
      I am currently a PhD student in Physics at the University of Liverpool and
      Xi'an Jiaotong-Liverpool University. My current research focuses on
      Multiple-Parton Interactions (MPIs), with a broader interest in particle
      physics, mathematical methods, and computational tools.
    - >-
      This homepage collects my education history, academic activities,
      teaching, talks, and publications.

