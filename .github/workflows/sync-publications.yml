name: Sync INSPIRE publications

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  sync-publications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch INSPIRE publications
        run: python3 tools/fetch_inspire_publications.py

      - name: Commit updates
        run: |
          if git diff --quiet -- _data/publications.yml; then
            echo "No publication updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/publications.yml
          git commit -m "Update INSPIRE publications"
          git push
